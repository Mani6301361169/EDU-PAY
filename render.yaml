services:
  - type: web
    name: edu-pay
    runtime: node
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: college-fees-system
      - key: CLIENT_URL
        sync: false
